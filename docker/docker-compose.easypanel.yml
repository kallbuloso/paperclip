services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - paperclip-pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: "0.0.0.0"
      PORT: "3100"
      SERVE_UI: "true"

      DATABASE_URL: "postgres://paperclip:${POSTGRES_PASSWORD}@db:5432/paperclip"

      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_CONFIG: "/paperclip/instances/default/config.json"
      PAPERCLIP_INSTANCE_ID: "default"

      PAPERCLIP_DEPLOYMENT_MODE: "${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-public}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_ALLOWED_HOSTNAMES}"

      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"

      # Recomendo NÃO colocar chaves de IA aqui se strict mode estiver ligado.
      # Adicione depois via secrets/config do próprio Paperclip.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPEN_ROUTER_API_KEY: "${OPEN_ROUTER_API_KEY:-}"

      PAPERCLIP_TELEMETRY_DISABLED: "${PAPERCLIP_TELEMETRY_DISABLED:-1}"

      # Ative depois do primeiro setup, não necessariamente no primeiro boot.
      PAPERCLIP_SECRETS_STRICT_MODE: "${PAPERCLIP_SECRETS_STRICT_MODE:-false}"

    volumes:
      - paperclip-data:/paperclip

volumes:
  paperclip-pgdata:
  paperclip-data:
